<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qivia — Carte des stations</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<style>
:root{--navy:#0D1117;--green:#00C48C;--white:#fff;--bg:#F8F9FB;--border:#E4E8EF;--muted:#6E7A8A;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;}
body{display:flex;flex-direction:column;background:var(--navy);}

/* TOPBAR */
#topbar{background:var(--navy);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.1);}
.logo-wrap{display:flex;align-items:center;gap:8px;font-weight:800;font-size:.95rem;color:#fff;margin-right:8px;}
.logo-q{width:26px;height:26px;border-radius:6px;background:var(--green);display:flex;align-items:center;justify-content:center;color:var(--navy);font-size:.72rem;font-weight:800;}
.logo-g{color:var(--green);}

/* NETWORK TABS */
.net-tabs{display:flex;gap:6px;}
.net-tab{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;transition:all .15s;white-space:nowrap;font-size:.75rem;font-weight:600;}
.net-tab:hover{border-color:#9ca3af;box-shadow:0 2px 6px rgba(0,0,0,.2);}


.net-tab.active{background:rgba(0,196,140,.2);border-color:#00C48C;color:#00C48C;}

.brand-pills{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.brand-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;transition:all .15s;white-space:nowrap;font-size:.75rem;font-weight:600;}
.brand-pill:hover{border-color:#9ca3af;box-shadow:0 2px 6px rgba(0,0,0,.2);}
.brand-pill.active{border-color:#00C48C;box-shadow:0 0 0 2px #00C48C;}
.brand-pill img{height:22px;width:auto;max-width:60px;object-fit:contain;flex-shrink:0;}
.brand-pill:hover{background:rgba(255,255,255,.08);color:#fff;}
.brand-pill.active{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4);color:#fff;}

/* FILTERS */
.filters{display:flex;gap:8px;align-items:center;margin-left:auto;flex-wrap:wrap;}
.filter-sep{width:1px;height:20px;background:rgba(255,255,255,.15);}
select.fsel{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:7px;padding:5px 10px;font-size:.75rem;cursor:pointer;outline:none;}
select.fsel option{background:#1e293b;color:#fff;}
.search-wrap{position:relative;}
#search-input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:7px;padding:5px 12px 5px 30px;font-size:.75rem;width:200px;outline:none;}
#search-input::placeholder{color:rgba(255,255,255,.4);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);font-size:.8rem;}
#autocomplete{position:absolute;top:calc(100% + 4px);left:0;width:280px;background:#1e293b;border:1px solid rgba(255,255,255,.15);border-radius:8px;z-index:9999;max-height:200px;overflow-y:auto;display:none;}
.ac-item{padding:8px 12px;font-size:.78rem;color:#fff;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06);}
.ac-item:hover{background:rgba(255,255,255,.08);}
.ac-item small{color:rgba(255,255,255,.4);display:block;font-size:.7rem;}

/* COUNTERS */
.counter-wrap{display:flex;gap:12px;}
.counter{text-align:center;}
.counter-val{font-size:.88rem;font-weight:800;color:var(--green);font-family:'JetBrains Mono',monospace;}
.counter-lbl{font-size:.58rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;}
.csv-btn{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);border-radius:8px;padding:5px 12px;font-size:.75rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s;}
.csv-btn:hover{background:rgba(255,255,255,.15);}
.csv-clear{background:rgba(240,78,55,.15);border-color:rgba(240,78,55,.3);color:#FF6B5B;}
.csv-clear:hover{background:rgba(240,78,55,.25);}
/* CSV modal */
.csv-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10000;display:flex;align-items:center;justify-content:center;}
.csv-modal{background:#1e293b;border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:28px;width:480px;max-width:95vw;}
.csv-modal h3{color:#fff;font-size:1rem;font-weight:700;margin-bottom:6px;}
.csv-modal p{color:rgba(255,255,255,.5);font-size:.78rem;margin-bottom:16px;line-height:1.5;}
.csv-modal pre{background:rgba(0,0,0,.3);border-radius:8px;padding:10px 14px;color:#00C48C;font-size:.72rem;margin-bottom:16px;font-family:'JetBrains Mono',monospace;}
.csv-modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.csv-modal-btn{padding:8px 18px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;}
.csv-modal-ok{background:var(--green);color:var(--navy);}
.csv-modal-cancel{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);}
.csv-error{color:#FF6B5B;font-size:.75rem;margin-top:8px;display:none;}

/* MAP */
#map{flex:1;min-height:0;}

/* POPUP */
.leaflet-popup-content{margin:10px 14px;min-width:240px;}
.popup-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.popup-logo{width:36px;height:36px;border-radius:8px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;padding:4px;flex-shrink:0;}
.popup-logo img{width:100%;height:100%;object-fit:contain;}
.popup-title{font-weight:700;font-size:13px;color:#0D1117;}
.popup-sub{font-size:11px;color:#6E7A8A;margin-top:1px;}
.popup-network{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;}
.net-badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px;}
.net-badge.qivia{background:#E6FBF4;color:#00956A;}
.net-badge.dkv{background:#FFF3E0;color:#E65100;}
.net-badge.total{background:#FEE2E2;color:#B91C1C;}
.net-badge.brand{background:#F3F4F6;color:#374151;}
.popup-prices{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.price-chip{background:#F8F9FB;border-radius:6px;padding:4px 8px;font-size:.7rem;border:1px solid #E4E8EF;}
.price-chip .fuel{color:#6E7A8A;font-weight:400;}
.price-chip .val{font-weight:700;color:#0D1117;}
.route-btn{width:100%;padding:8px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;margin-bottom:4px;}
.route-btn:hover{background:#1e293b;}
.route-btn:disabled{background:#9CA3AF;cursor:wait;}
.route-info{background:#EEF3FD;border-radius:8px;padding:10px 12px;margin-top:6px;display:none;}
.route-info-title{font-weight:700;font-size:.78rem;color:#2D6BE4;margin-bottom:4px;}
.route-stats{display:flex;gap:16px;}
.route-stat span:first-child{display:block;font-size:1.1rem;font-weight:800;color:#2D6BE4;}
.route-stat span:last-child{font-size:.65rem;color:#6E7A8A;}
.clear-route{width:100%;padding:5px;background:#FEE2E2;color:#B91C1C;border:none;border-radius:6px;font-size:.72rem;cursor:pointer;margin-top:4px;display:none;}

/* Agence popup */
.agence-popup .popup-title{color:#2D6BE4;}
.agence-logo{background:#EEF3FD;}

/* Leaflet cluster override */
.marker-cluster-small{background-color:rgba(0,196,140,.3)!important;}
.marker-cluster-small div{background-color:rgba(0,196,140,.7)!important;color:#fff!important;font-weight:700;}
.marker-cluster-medium{background-color:rgba(45,107,228,.3)!important;}
.marker-cluster-medium div{background-color:rgba(45,107,228,.7)!important;color:#fff!important;font-weight:700;}

.nav-wrap{position:relative;}
.nav-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:8px;padding:5px 12px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.nav-btn:hover{background:rgba(255,255,255,.15);}
.nav-arrow{font-size:.6rem;color:rgba(255,255,255,.5);}
.nav-dropdown{position:absolute;top:calc(100% + 6px);left:0;background:#1e293b;border:1px solid rgba(255,255,255,.15);border-radius:10px;min-width:200px;z-index:9999;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.nav-dropdown.open{display:block;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;color:rgba(255,255,255,.8);font-size:.8rem;font-weight:500;cursor:pointer;border-radius:8px;margin:4px;text-decoration:none;}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:rgba(0,196,140,.15);color:#00C48C;}
.nav-item-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;}

/* ── ROUTE CONTROL ── */
.route-control{position:absolute;bottom:20px;left:60px;right:auto;transform:none;z-index:1000;background:#1e293b;border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:0;width:300px;box-shadow:0 -4px 24px rgba(0,0,0,.5);}
.route-control.collapsed{width:auto;height:auto;padding:0;border-radius:30px;overflow:hidden;cursor:pointer;}
.route-toggle{height:38px;padding:0 18px;display:flex;align-items:center;gap:8px;font-size:.8rem;font-weight:600;color:#fff;cursor:pointer;flex-shrink:0;white-space:nowrap;}
.route-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.route-header span{color:#fff;font-size:.78rem;font-weight:700;flex:1;}
.route-close{color:rgba(255,255,255,.4);cursor:pointer;font-size:.9rem;padding:2px 4px;}
.route-close:hover{color:#fff;}
.route-input-wrap{position:relative;margin-bottom:6px;}
.route-input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:8px;padding:7px 30px 7px 10px;font-size:.75rem;outline:none;font-family:'Inter',sans-serif;}
.route-input::placeholder{color:rgba(255,255,255,.35);}
.route-input:focus{border-color:#00C48C;}
.route-swap{width:100%;padding:5px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);border-radius:6px;font-size:.72rem;cursor:pointer;margin-bottom:6px;font-family:'Inter',sans-serif;}
.route-swap:hover{background:rgba(255,255,255,.1);color:#fff;}
.route-go{width:100%;padding:8px;background:#00C48C;color:#0D1117;border:none;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
.route-go:hover{background:#00b37e;}
.route-go:disabled{background:#374151;color:#6B7280;cursor:wait;}
.route-result{background:#1e293b;border:1px solid rgba(0,196,140,.4);border-radius:0 0 16px 16px;padding:10px 14px;display:none;}
.route-result-stats{display:flex;gap:24px;justify-content:center;padding:4px 0;}
.route-result-stat{display:flex;flex-direction:column;align-items:center;min-width:80px;}
.route-result-stat span:first-child{display:block;font-size:1.1rem;font-weight:800;color:#00C48C;line-height:1.2;}
.route-result-stat span:last-child{font-size:.65rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.05em;}
.route-clear{background:none;border:none;color:rgba(255,100,80,.7);font-size:.68rem;cursor:pointer;margin-top:6px;font-family:'Inter',sans-serif;padding:0;text-align:right;width:100%;display:block;}
.route-ac{position:absolute;top:calc(100% + 2px);left:0;right:0;background:#1e293b;border:1px solid rgba(255,255,255,.15);border-radius:8px;z-index:9999;max-height:140px;overflow-y:auto;display:none;}
.route-ac-item{padding:7px 10px;font-size:.73rem;color:rgba(255,255,255,.8);cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05);}
.route-ac-item:hover{background:rgba(255,255,255,.08);}
</style>
</head>

    </div>

    </div>

        </div>
      </div>

// DONNÉES — chargées depuis le GeoJSON gouvernemental
// (stations_lite.geojson)
// ═══════════════════════════════════════
let QIVIA_DATA = [];
let DKV_DATA   = [];
let TOTAL_DATA = [];

/**
 * Convertit un feature GeoJSON gouvernemental
 * vers le format station attendu par le template.
 *
 * Champs source (properties) :
 *   id, adresse, ville, cp, departement, region
 *   gazole_prix, sp95_prix, e10_prix, sp98_prix, e85_prix, gplc_prix
 *   carburants_disponibles
 *   geometry.coordinates : [longitude, latitude]
 */
function normalizeGovFeature(feature) {
  const g = feature.geometry || {};
  const p = feature.properties || {};

  const lng = Array.isArray(g.coordinates) ? g.coordinates[0] : null;
  const lat = Array.isArray(g.coordinates) ? g.coordinates[1] : null;
  if (!lat || !lng) return null;

  const FUEL_KEYS = {
    gazole_prix: 'gazole',
    sp95_prix:   'sp95',
    e10_prix:    'e10',
    sp98_prix:   'sp98',
    e85_prix:    'e85',
    gplc_prix:   'gplc',
  };

  const prices = {};
  for (const [src, dest] of Object.entries(FUEL_KEYS)) {
    const v = parseFloat(p[src]);
    if (!isNaN(v) && v > 0) prices[dest] = v;
  }

  // Marque, DKV et TotalEnergies viennent directement du GeoJSON enrichi (jointure Excel)
  const adresse = p.adresse || '';
  return {
    uuid:           String(p.id || ''),
    name:           adresse.slice(0, 60),
    address:        adresse,
    city:           p.ville        || '',
    postal:         p.cp           || '',
    department:     p.departement  || '',
    region:         p.region       || '',
    brand:          p.brand        || 'Autre',
    dkv:            Number(p.dkv)  === 1,
    total_energies: Number(p.total_energies) === 1,
    lat,
    lon:            lng,
    prices,
    fuels:          Object.keys(prices).map(k => FUEL_KEYS_FR[k] || k),
  };
}

const FUEL_KEYS_FR = {
  gazole:'Gazole', sp95:'SP95', e10:'E10',
  sp98:'SP98',     e85:'E85',   gplc:'GPLc',
};

/**
 * Charge le GeoJSON gouvernemental, normalise les stations,
 * puis démarre la carte.
 */
async function loadGeoJSON() {
  const loader = document.getElementById('geojson-loader');
  try {
    if (loader) loader.style.display = 'flex';
    const res = await fetch('stations_lite.geojson');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const gj = await res.json();

    const features = gj.features || [];
    const stations = features.map(normalizeGovFeature).filter(Boolean);

    QIVIA_DATA = stations;
    DKV_DATA   = stations.filter(s => s.dkv === true);
    TOTAL_DATA = stations.filter(s => s.total_energies === true);

    if (loader) loader.style.display = 'none';
    console.log(`[GeoJSON] ${stations.length} stations chargées`);
    initMap();

  } catch (err) {
    console.error('[GeoJSON] Erreur de chargement :', err);
    if (loader) {
      loader.innerHTML = `<div style="color:#FF6B5B;text-align:center;padding:24px">
        ⚠️ Impossible de charger le GeoJSON<br>
        <small style="color:rgba(255,255,255,.4)">${err.message}</small><br>
        <small style="color:rgba(255,255,255,.3);margin-top:8px;display:block">
          Vérifiez que le fichier<br>
          <code>stations_lite.geojson</code><br>
          est bien dans le même dossier que cette page.
        </small>
      </div>`;
    }
  }
}

function getStationIcon(station, network, opacity=1) {
  const brandKey = (station.brand||'').toLowerCase().trim();
  const imgKey   = BRAND_LOGO_MAP[brandKey];
  const imgSrc   = BRAND_IMGS[imgKey] || BRAND_IMGS['autre'] || null;
  const size = 28;
  const html = imgSrc
    ? `<div style="width:${size}px;height:${size}px;border-radius:50%;background:#fff;border:2px solid ${getNetColor(network)};display:flex;align-items:center;justify-content:center;padding:3px;opacity:${opacity};box-shadow:0 2px 6px rgba(0,0,0,.3)"><img src="${imgSrc}" style="width:100%;height:100%;object-fit:contain"></div>`
    : `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${getNetColor(network)};border:2px solid #fff;opacity:${opacity};box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>`;
  return L.divIcon({html, className:'', iconSize:[size,size], iconAnchor:[size/2,size/2], popupAnchor:[0,-size/2]});
}

function getNetColor(net) {
  return net==='qivia'?'#00C48C':net==='dkv'?'#F97316':net==='total'?'#EF4444':'#6366F1';
}

function getNetLabel(net) {
  return net==='qivia'?'Qivia':net==='dkv'?'DKV':net==='total'?'TotalEnergies':'';
}

function getNetworks(station) {
  const nets = [];
  if(QIVIA_DATA.some(s=>s.lat===station.lat&&s.lon===station.lon)) nets.push('qivia');
  if(DKV_DATA.some(s=>s.lat===station.lat&&s.lon===station.lon)) nets.push('dkv');
  if(TOTAL_DATA.some(s=>s.lat===station.lat&&s.lon===station.lon)) nets.push('total');
  return nets;
}

function getNetworksForStation(s) {
  const result = [];
  const isQivia = QIVIA_DATA.some(q=>q.lat===s.lat&&q.lon===s.lon);
  const isDKV   = DKV_DATA.some(d=>d.lat===s.lat&&d.lon===s.lon);
  const isTotal = TOTAL_DATA.some(t=>t.lat===s.lat&&t.lon===s.lon);
  if(isQivia) result.push({type:'qivia', label:'Qivia'});
  if(isDKV)   result.push({type:'dkv',   label:'DKV'});
  if(isTotal) result.push({type:'total', label:'TotalEnergies'});
  // Add brand network if not already covered
  const brand = (s.brand||'').toLowerCase();
  if(brand && brand!=='nan' && brand!=='autre') {
    const brandNet = getBrandNetLabel(s.brand);
    if(brandNet && !result.find(r=>r.label===brandNet))
      result.push({type:'brand', label:brandNet});
  }
  return result;
}

function getBrandNetLabel(brand) {
  const b = (brand||'').toLowerCase();
  const networks = {
    'leclerc':'Leclerc','intermarché':'Intermarché','intermarche':'Intermarché',
    'carrefour':'Carrefour','super u':'Super U','auchan':'Auchan',
    'netto':'Netto','casino':'Casino','esso':'Esso','bp':'BP',
    'avia':'Avia','eni/agip':'Eni/Agip','dyneff':'Dyneff','shell':'Shell','elan':'Elan'
  };
  return networks[b] || null;
}

function buildPricesHtml(prices) {
  if(!prices) return '';
  return Object.entries(prices).filter(([k,v])=>v!=null&&v!==0).map(([k,v])=>
    `<div class="price-chip"><span class="fuel">${FUEL_NAMES[k]||k} </span><span class="val">${parseFloat(v).toFixed(3)} €</span></div>`
  ).join('');
}

function buildPopup(s, network) {
  const brandKey = (s.brand||'').toLowerCase().trim();
  const imgKey   = BRAND_LOGO_MAP[brandKey];
  const imgSrc   = BRAND_IMGS[imgKey] || BRAND_IMGS['autre'] || null;
  const logoHtml = imgSrc ? `<img src="${imgSrc}" style="width:100%;height:100%;object-fit:contain">` : '⛽';
  // Always show ALL networks this station belongs to
  const allNets = getNetworksForStation(s);

    ? allNets.map(n=>`<span class="net-badge ${n.type}">${n.label}</span>`).join('')
    : `<span class="net-badge qivia">Qivia</span>`;
  const uid = `${s.lat}_${s.lon}`.replace(/\./g,'_');
  // Filter prices by selected fuel if any
  const fuelFilter = document.getElementById('fuel-select') ? document.getElementById('fuel-select').value : '';
  const filteredPrices = fuelFilter && s.prices ? {[fuelFilter]: s.prices[fuelFilter]} : s.prices;
  return `
    <div>
      <div class="popup-header">
        <div class="popup-logo">${logoHtml}</div>

        <div id="rinfo_text_${uid}"></div>
        <div class="route-stats" id="rinfo_stats_${uid}"></div>
      </div>
      <button class="clear-route" id="clear_${uid}" onclick="clearRoute('${uid}')">✕ Supprimer l'itinéraire</button>
    </div>`;
}

function drawMarkers() {
  if(stationCluster) { map.removeLayer(stationCluster); stationCluster = null; }
  allMarkers = [];

  const datasets = {
    qivia: QIVIA_DATA,
    dkv: DKV_DATA,
    total: TOTAL_DATA
  };

  stationCluster = L.markerClusterGroup({
    maxClusterRadius: 40,
    iconCreateFunction: function(cluster) {
      const count = cluster.getChildCount();
      return L.divIcon({
        html: `<div style="background:rgba(0,196,140,.85);color:#fff;font-weight:800;font-size:12px;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)">${count}</div>`,
        className:'', iconSize:[36,36]
      });
    }
  });

  let totalShown = 0;
  const seen = new Set();

  if(selectedBrands.size > 0) {
    // Filter by selected brands across all Qivia stations
    QIVIA_DATA.forEach(s => {
      if(!s.lat || !s.lon) return;
      if(!filterStation(s)) return;
      const sb = (s.brand||'').toLowerCase();
      if(![...selectedBrands].some(b => sb === b.toLowerCase())) return;
      const key = `${s.lat}_${s.lon}`;
      if(seen.has(key)) return;
      seen.add(key);
      const marker = L.marker([s.lat, s.lon], {icon: getStationIcon(s, 'qivia', 1)});
      marker.bindPopup(buildPopup(s, 'qivia'), {maxWidth:300});
      stationCluster.addLayer(marker);
      allMarkers.push(marker);
      totalShown++;
    });
  } else {
    const nets = [currentNetwork];
    nets.forEach(net => {
      const data = datasets[net];
      data.forEach(s => {
        if(!s.lat || !s.lon) return;
        if(!filterStation(s)) return;
        const key = `${s.lat}_${s.lon}`;
        if(seen.has(key)) return;
        seen.add(key);
        const marker = L.marker([s.lat, s.lon], {icon: getStationIcon(s, net, 1)});
        marker.bindPopup(buildPopup(s, currentNetwork), {maxWidth:300});
        stationCluster.addLayer(marker);
        allMarkers.push(marker);
        totalShown++;
      });
    });
  }

  map.addLayer(stationCluster);
  document.getElementById('cnt-stations').textContent = totalShown.toLocaleString('fr-FR');
}

// ROUTING
// ═══════════════════════════════════════
async function calcRoute(lat, lon, uid) {
  const btn = document.getElementById('rbtn_' + uid);
  const info = document.getElementById('rinfo_' + uid);
  const clearBtn = document.getElementById('clear_' + uid);
  btn.disabled = true;
  btn.textContent = '⏳ Calcul en cours…';

  // Find nearest agence
  let nearest = null, minDist = Infinity;
  CLIENT_CONFIG.agences.forEach(a => {
    const d = Math.sqrt((a.lat-lat)**2 + (a.lon-lon)**2);
    if(d < minDist) { minDist = d; nearest = a; }
  });
  if(!nearest) { btn.disabled=false; btn.textContent='📍 Calculer itinéraire'; return; }

  try {
    const url = `https://router.project-osrm.org/route/v1/driving/${nearest.lon},${nearest.lat};${lon},${lat}?overview=full&geometries=geojson`;
    const r = await fetch(url);
    const d = await r.json();
    if(d.routes && d.routes[0]) {
      const route = d.routes[0];
      const km = (route.distance/1000).toFixed(1);
      const min = Math.round(route.duration/60);
      const h = Math.floor(min/60), m = min%60;
      const durStr = h > 0 ? `${h}h${m.toString().padStart(2,'0')}` : `${m} min`;

      if(routeLayer) map.removeLayer(routeLayer);
      routeLayer = L.geoJSON(route.geometry, {style:{color:'#2D6BE4',weight:4,opacity:.8}}).addTo(map);
      map.fitBounds(routeLayer.getBounds(), {padding:[40,40]});

      if(info) info.style.display = '';
      if(clearBtn) clearBtn.style.display = '';
      document.getElementById('rinfo_text_' + uid).textContent = `Depuis: ${nearest.nom} (${nearest.ville})`;
      document.getElementById('rinfo_stats_' + uid).innerHTML = `
        <div class="route-stat"><span>${km} km</span><span>Distance</span></div>
        <div class="route-stat"><span>${durStr}</span><span>Durée</span></div>`;
    }
  } catch(e) {
    info.style.display = '';
    document.getElementById('rinfo_text_' + uid).textContent = `Erreur de calcul d'itinéraire`;
  }
  btn.disabled = false;
  btn.textContent = '📍 Recalculer';
}

function clearRoute(uid) {
  if(routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  document.getElementById('rinfo_' + uid).style.display = 'none';
  document.getElementById('clear_' + uid).style.display = 'none';
  document.getElementById('rbtn_' + uid).textContent = `📍 Calculer l'itinéraire depuis une agence`;
}

let searchTimeout;
function onSearch() {
  clearTimeout(searchTimeout);
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const ac = document.getElementById('autocomplete');
  if(q.length < 2) { ac.style.display='none'; return; }
  searchTimeout = setTimeout(() => {
    const allData = currentNetwork==='all'
      ? [...QIVIA_DATA,...DKV_DATA,...TOTAL_DATA]
      : (currentNetwork==='qivia'?QIVIA_DATA:currentNetwork==='dkv'?DKV_DATA:TOTAL_DATA);
    const matches = [];
    const cities = new Map();
    allData.forEach(s => {
      const city = (s.city||'').toLowerCase();
      const dept = (s.department||'').toLowerCase();
      const region = (s.region||'').toLowerCase();
      if((city.includes(q)||dept.includes(q)||region.includes(q)) && !cities.has(city)) {
        cities.set(city, s);
        matches.push(s);
      }
    });
    const top = matches.slice(0,8);
    if(!top.length) { ac.style.display='none'; return; }
    ac.innerHTML = top.map(s=>`
      <div class="ac-item" onclick="gotoCity(${s.lat},${s.lon},'${(s.city||'').replace(/'/g,"\'")}')">
        ${s.city||''}
        <small>${s.department||''} — ${s.region||''}</small>
      </div>`).join('');
    ac.style.display = '';
  }, 200);
}

function gotoCity(lat, lon, city) {
  if(boundaryLayer) { map.removeLayer(boundaryLayer); boundaryLayer = null; }
  map.setView([lat, lon], 12);
  document.getElementById('search-input').value = city;
  document.getElementById('autocomplete').style.display = 'none';
}

let boundaryLayer = null;

async function geocodeSearch() {
  const q = document.getElementById('search-input').value.trim();
  if(!q) return;
  document.getElementById('autocomplete').style.display = 'none';

  // Remove previous boundary
  if(boundaryLayer) { map.removeLayer(boundaryLayer); boundaryLayer = null; }

  try {
    // 1. Search location
    const searchUrl = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q+' France')}&format=json&limit=1&polygon_geojson=1`;
    const r = await fetch(searchUrl, {headers:{'Accept-Language':'fr'}});
    const data = await r.json();

    if(data && data[0]) {
      const result = data[0];
      const lat = parseFloat(result.lat);
      const lon = parseFloat(result.lon);

      // 2. Draw boundary if polygon available
      if(result.geojson && (result.geojson.type === 'Polygon' || result.geojson.type === 'MultiPolygon')) {
        boundaryLayer = L.geoJSON(result.geojson, {
          style: {
            color: '#2D6BE4',
            weight: 2.5,
            opacity: 0.9,
            fillColor: '#2D6BE4',
            fillOpacity: 0.06,
            dashArray: '6,4'
          }
        }).addTo(map);
        map.fitBounds(boundaryLayer.getBounds(), {padding: [30,30]});
        const cb = document.getElementById('clear-boundary');
        if(cb) cb.style.display = '';
      } else {
        map.setView([lat, lon], 11);
      }
    }
  } catch(e) {
    // fallback: search in stations data
    const q2 = q.toLowerCase();
    const found = [...QIVIA_DATA,...DKV_DATA,...TOTAL_DATA].find(s =>
      (s.city||'').toLowerCase().includes(q2) ||
      (s.department||'').toLowerCase().includes(q2) ||
      (s.region||'').toLowerCase().includes(q2)
    );
    if(found) map.setView([found.lat, found.lon], 10);
  }
}

function clearBoundary() {
  if(boundaryLayer) { map.removeLayer(boundaryLayer); boundaryLayer = null; }
  document.getElementById('search-input').value = '';
  const cb = document.getElementById('clear-boundary');
  if(cb) cb.style.display = 'none';
}

document.addEventListener('click', e => {
  if(!e.target.closest('#search-input') && !e.target.closest('#autocomplete'))
    document.getElementById('autocomplete').style.display = 'none';
});

// ITINERARY — CLEAN REWRITE
// ════════════════════════════════════════
let riLayer = null;
let riTimers = {};
let riCoords = {from: null, to: null};

function toggleRoute() {
  const form = document.getElementById('route-form');
  form.style.display = form.style.display === 'none' ? '' : 'none';
}

function riSwap() {
  const a = document.getElementById('ri-from');
  const b = document.getElementById('ri-to');
  [a.value, b.value] = [b.value, a.value];
  [riCoords.from, riCoords.to] = [riCoords.to, riCoords.from];
}

async function riAutoComplete(which) {
  const q = document.getElementById(`ri-${which}`).value.trim();
  const ac = document.getElementById(`ri-ac-${which}`);
  riCoords[which] = null;
  if (q.length < 2) { ac.style.display = 'none'; return; }
  clearTimeout(riTimers[which]);
  riTimers[which] = setTimeout(async () => {
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q + ' France')}&format=json&limit=5`, { headers: { 'Accept-Language': 'fr' } });
      const data = await r.json();
      if (!data.length) { ac.style.display = 'none'; return; }
      ac.innerHTML = data.map(d =>
        `<div onclick="riSelect('${which}',${d.lat},${d.lon},'${d.display_name.split(',').slice(0,2).join(',').replace(/'/g,"\'")}' )"
          style="padding:7px 10px;font-size:.73rem;color:rgba(255,255,255,.85);cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06);"
          onmouseover="this.style.background='rgba(255,255,255,.08)'" onmouseout="this.style.background=''"
        >${d.display_name.split(',').slice(0, 3).join(', ')}</div>`
      ).join('');
      ac.style.display = '';
    } catch(e) { ac.style.display = 'none'; }
  }, 300);
}

function riSelect(which, lat, lon, name) {
  riCoords[which] = { lat: parseFloat(lat), lon: parseFloat(lon) };
  document.getElementById(`ri-${which}`).value = name;
  document.getElementById(`ri-ac-${which}`).style.display = 'none';
}

async function riGeocode(which) {
  if (riCoords[which]) return riCoords[which];
  const val = document.getElementById(`ri-${which}`).value.trim();
  if (!val) return null;
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(val + ' France')}&format=json&limit=1`, { headers: { 'Accept-Language': 'fr' } });
    const d = await r.json();
    if (d[0]) { riCoords[which] = { lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon) }; return riCoords[which]; }
  } catch(e) {}
  return null;
}

async function calcRoute() {
  const btn = document.getElementById('ri-go');
  btn.textContent = '⏳ Calcul…';
  btn.disabled = true;

  const from = await riGeocode('from');
  const to   = await riGeocode('to');

  if (!from || !to) {
    btn.textContent = 'Calculer';
    btn.disabled = false;
    alert('Veuillez entrer un départ et une arrivée valides.');
    return;
  }

  // Remove previous route
  if (riLayer) { map.removeLayer(riLayer); riLayer = null; }

  try {
    const url = `https://router.project-osrm.org/route/v1/driving/${from.lon},${from.lat};${to.lon},${to.lat}?overview=full&geometries=geojson`;
    const resp = await fetch(url);
    const data = await resp.json();

    if (data.code === 'Ok' && data.routes[0]) {
      const route = data.routes[0];
      const km = (route.distance / 1000).toFixed(1);
      const totalMin = Math.round(route.duration / 60);
      const h = Math.floor(totalMin / 60), m = totalMin % 60;
      const dur = h > 0 ? `${h}h${String(m).padStart(2,'0')}` : `${totalMin} min`;

      riLayer = L.geoJSON(route.geometry, { style: { color: '#2D6BE4', weight: 5, opacity: .85 } }).addTo(map);
      map.fitBounds(riLayer.getBounds(), { padding: [50, 50] });

      document.getElementById('ri-dist').textContent = km + ' km';
      document.getElementById('ri-dur').textContent = dur;
    } else {
      throw new Error('no route');
    }
  } catch(e) {
    // Straight-line fallback
    const dx = (to.lon - from.lon) * 111 * Math.cos(from.lat * Math.PI / 180);
    const dy = (to.lat - from.lat) * 111;
    const km = (Math.sqrt(dx*dx + dy*dy) * 1.3).toFixed(1);
    const totalMin = Math.round(parseFloat(km) / 80 * 60);
    const h = Math.floor(totalMin / 60), m = totalMin % 60;
    const dur = h > 0 ? `${h}h${String(m).padStart(2,'0')}` : `${totalMin} min`;

    riLayer = L.polyline([[from.lat, from.lon], [to.lat, to.lon]], { color: '#F97316', weight: 3, dashArray: '8,5' }).addTo(map);
    map.fitBounds([[from.lat, from.lon], [to.lat, to.lon]], { padding: [60, 60] });

    document.getElementById('ri-dist').textContent = '~' + km + ' km';
    document.getElementById('ri-dur').textContent = '~' + dur;
  }

  document.getElementById('ri-result').style.display = 'block';
  btn.textContent = 'Recalculer';
  btn.disabled = false;
}

function clearRoute() {
  if (riLayer) { map.removeLayer(riLayer); riLayer = null; }
  document.getElementById('ri-from').value = '';
  document.getElementById('ri-to').value = '';
  document.getElementById('ri-result').style.display = 'none';
  document.getElementById('ri-go').textContent = 'Calculer';
  riCoords = { from: null, to: null };
}

document.addEventListener('click', e => {
  if (!e.target.closest('#ri-from') && !e.target.closest('#ri-ac-from'))
    document.getElementById('ri-ac-from').style.display = 'none';
  if (!e.target.closest('#ri-to') && !e.target.closest('#ri-ac-to'))
    document.getElementById('ri-ac-to').style.display = 'none';
});

// CSV AGENCES IMPORT
// ═══════════════════════════════════════
async function geocodeAddress(address) {
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address+', France')}&format=json&limit=1`;
    const r = await fetch(url, {headers:{'Accept-Language':'fr'}});
    const d = await r.json();
    if(d && d[0]) return {lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon)};
  } catch(e) {}
  return null;
}

function loadAgencesCSV(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const text = e.target.result;
    const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
    // Skip header if it looks like one
    const start = (lines[0].toLowerCase().includes('nom') || lines[0].toLowerCase().includes('name')) ? 1 : 0;
    const rows = lines.slice(start);

    if(!rows.length) return;

    // Show loading modal
    showCSVModal(rows.length);
  };
  reader.readAsText(file, 'UTF-8');
}

function showCSVModal(count) {
  const modal = document.createElement('div');
  modal.className = 'csv-modal-bg';
  modal.id = 'csv-modal';
  modal.innerHTML = `
    <div class="csv-modal">
      <h3>📂 Importer les agences</h3>
      <p>${count} agence(s) détectée(s). Le fichier doit être au format :<br>
      <strong style="color:#fff">Nom,Adresse</strong> (une ligne par agence)</p>
      <pre>Agence Paris,12 rue de la Paix Paris
Agence Lyon,5 place Bellecour Lyon</pre>
      <div id="csv-progress" style="color:rgba(255,255,255,.5);font-size:.75rem;margin-bottom:8px;display:none">⏳ Géocodage en cours…</div>
      <div class="csv-error" id="csv-error"></div>
      <div class="csv-modal-btns">
        <button class="csv-modal-btn csv-modal-cancel" onclick="closeCSVModal()">Annuler</button>
        <button class="csv-modal-btn csv-modal-ok" id="csv-modal-ok" onclick="processCSV()">Importer</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function closeCSVModal() {
  const m = document.getElementById('csv-modal');
  if(m) m.remove();
  document.getElementById('csv-input').value = '';
}

async function processCSV() {
  const input = document.getElementById('csv-input');
  const file = input.files[0];
  if(!file) return;

  const btn = document.getElementById('csv-modal-ok');
  const prog = document.getElementById('csv-progress');
  btn.disabled = true;
  btn.textContent = '⏳ En cours…';
  prog.style.display = '';

  const reader = new FileReader();
  reader.onload = async (e) => {
    const text = e.target.result;
    const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
    const start = (lines[0].toLowerCase().includes('nom') || lines[0].toLowerCase().includes('name')) ? 1 : 0;
    const rows = lines.slice(start);

    const agences = [];
    for(let i=0; i<rows.length; i++) {
      prog.textContent = `⏳ Géocodage ${i+1}/${rows.length}…`;
      const parts = rows[i].split(',');
      const nom = (parts[0]||'').trim();
      const adresse = parts.slice(1).join(',').trim();
      if(!nom) continue;

      // Try geocoding
      const coords = await geocodeAddress(adresse || nom);
      if(coords) {
        agences.push({nom, adresse, ville: '', region: '', lat: coords.lat, lon: coords.lon});
      } else {
        agences.push({nom, adresse, ville: '', region: '', lat: null, lon: null});
      }
      // Small delay to respect Nominatim rate limit
      await new Promise(r => setTimeout(r, 1100));
    }

    const valid = agences.filter(a=>a.lat!==null);
    const invalid = agences.filter(a=>a.lat===null);

    CLIENT_CONFIG.agences = valid;
    drawAgences();

    if(invalid.length) {
      document.getElementById('csv-error').style.display = '';
      document.getElementById('csv-error').textContent = `⚠️ ${invalid.length} adresse(s) non trouvée(s): ${invalid.map(a=>a.nom).join(', ')}`;
    }

    document.getElementById('csv-clear-btn').style.display = '';
    setTimeout(closeCSVModal, 1500);
  };
  reader.readAsText(file, 'UTF-8');
}

function clearAgences() {
  CLIENT_CONFIG.agences = [];
  if(agenceLayer) { map.removeLayer(agenceLayer); agenceLayer = null; }
  document.getElementById('cnt-agences').textContent = '0';
  document.getElementById('csv-clear-btn').style.display = 'none';
  document.getElementById('csv-input').value = '';
}
