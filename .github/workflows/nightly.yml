name: Qivia — Mise à jour quotidienne

on:
  schedule:
    - cron: '1 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch data & build JSON
        run: python fetch_and_build.py

      - name: Commit & push CSV + JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git reset --hard HEAD
          git pull origin main
          git add csv/ qivia_data.json
          git diff --cached --quiet || git commit -m "chore: données $(date +'%Y-%m-%d')"
          git push
